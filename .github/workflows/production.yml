name: Release

on:
  push:
    tags:
      - 'release-v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  release-quality-gate:
    name: Release quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release preparation checks
        run: npm run release:prepare

      - name: Release dry-run package check
        run: npm run release:dry-run

  publish-npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: release-quality-gate
    if: startsWith(github.ref, 'refs/tags/')
    environment: production
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      # Node 22.14+ required for npm trusted publishing (OIDC)
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.14"
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release safety checks
        run: npm run release:prepare

      # Trusted publishing (OIDC) requires npm 11.5.1+. Ensure workflow filename
      # on npm package Trusted Publisher settings is exactly: production.yml
      - name: Use npm required for trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --access public --provenance --ignore-scripts
